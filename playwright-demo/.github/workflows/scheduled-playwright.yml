name: Scheduled Playwright Run

permissions:
  contents: read

concurrency:
  group: scheduled-playwright-oft
  cancel-in-progress: false

on:
  schedule:
    # Runs daily at 03:20 PM IST (10:50 UTC).
    - cron: '50 10 * * *'
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: self-hosted
    timeout-minutes: 45

    defaults:
      run:
        working-directory: playwright-demo

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      CI: 'true'
      PW_TRACE_MODE: 'off'
      PW_SCREENSHOT_KEEP_RUNS: '1'
      PW_HTML_REPORT: '1'
      BASE_URL: ${{ secrets.BASE_URL }}
      LOGIN_USERNAME: ${{ secrets.LOGIN_USERNAME }}
      LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
      LOGIN_OTP: ${{ secrets.LOGIN_OTP }}
      HEADLESS: 'true'
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      SMTP_ENABLE_SSL: ${{ secrets.SMTP_ENABLE_SSL }}
      OFT_LOCAL_FROM_ACCOUNT_TYPE: ${{ secrets.OFT_LOCAL_FROM_ACCOUNT_TYPE }}
      OFT_LOCAL_TO_ACCOUNT_TYPE: ${{ secrets.OFT_LOCAL_TO_ACCOUNT_TYPE }}
      OFT_LOCAL_AMOUNT: ${{ secrets.OFT_LOCAL_AMOUNT }}
      OFT_LOCAL_DESCRIPTION: ${{ secrets.OFT_LOCAL_DESCRIPTION }}
      OFT_EUR_FROM_ACCOUNT_TYPE: ${{ secrets.OFT_EUR_FROM_ACCOUNT_TYPE }}
      OFT_EUR_TO_ACCOUNT_TYPE: ${{ secrets.OFT_EUR_TO_ACCOUNT_TYPE }}
      OFT_EUR_AMOUNT: ${{ secrets.OFT_EUR_AMOUNT }}
      OFT_EUR_DESCRIPTION: ${{ secrets.OFT_EUR_DESCRIPTION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: powershell
        run: |
          $required = @(
            'BASE_URL','LOGIN_USERNAME','LOGIN_PASSWORD','LOGIN_OTP',
            'OFT_LOCAL_FROM_ACCOUNT_TYPE','OFT_LOCAL_TO_ACCOUNT_TYPE',
            'OFT_LOCAL_AMOUNT','OFT_LOCAL_DESCRIPTION',
            'OFT_EUR_FROM_ACCOUNT_TYPE','OFT_EUR_TO_ACCOUNT_TYPE',
            'OFT_EUR_AMOUNT','OFT_EUR_DESCRIPTION'
          )
          $missing = @()
          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace((Get-Item -Path "Env:$name" -ErrorAction SilentlyContinue).Value)) {
              $missing += $name
            }
          }
          if ($missing.Count -gt 0) {
            $missing | ForEach-Object { Write-Host "Missing secret: $_" }
            throw 'Required secrets are missing.'
          }
          Write-Host "All required secrets are present."

      - name: Check app is reachable
        shell: powershell
        run: |
          $url = $env:BASE_URL
          Write-Host "Checking connectivity to: $url"
          try {
            $response = Invoke-WebRequest -Uri $url -TimeoutSec 15 -UseBasicParsing -ErrorAction Stop
            Write-Host "App is reachable. Status: $($response.StatusCode)"
          } catch {
            Write-Host "ERROR: Cannot reach $url"
            Write-Host "Make sure this runner has network access to the internal app URL."
            throw 'App URL is not reachable from this runner. Aborting tests.'
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install

      - name: Pre-run maintenance cleanup
        run: npm run maintenance:pre-run

      - name: Run all test suites
        id: run_tests
        continue-on-error: true
        run: npx playwright test --workers=1 --retries=1

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-demo/playwright-report
            playwright-demo/test-results
          if-no-files-found: ignore

      - name: Send test report email
        if: always()
        shell: powershell
        working-directory: ${{ github.workspace }}
        run: |
          $outcome     = '${{ steps.run_tests.outcome }}'
          $dateStr     = Get-Date -Format 'dd MMM yyyy HH:mm'
          $reportDir   = Join-Path $env:GITHUB_WORKSPACE 'playwright-demo\playwright-report'
          $resultsJson = Join-Path $env:GITHUB_WORKSPACE 'playwright-demo\test-results\results.json'
          $screensDir  = Join-Path $env:GITHUB_WORKSPACE 'playwright-demo\screenshots'
          $zipPath     = Join-Path $env:RUNNER_TEMP 'playwright-report.zip'
          $hasReport   = $false
          if (Test-Path $reportDir) {
            Compress-Archive -Path "$reportDir\*" -DestinationPath $zipPath -Force
            $hasReport = $true
          }
          $passed = 0; $failed = 0; $skipped = 0; $total = 0; $durSec = 0
          $rows = ''
          function To-FeatureName($suiteName) {
            if ([string]::IsNullOrWhiteSpace($suiteName)) { return 'Unknown' }
            $parts = $suiteName -split '[-_]'
            $titleParts = @()
            foreach ($part in $parts) {
              if (-not [string]::IsNullOrWhiteSpace($part)) {
                $titleParts += (($part.Substring(0,1).ToUpper()) + $part.Substring(1).ToLower())
              }
            }
            return ($titleParts -join ' ')
          }
          function Get-TestRows($suite, $sName) {
            $out = ''
            $featureName = To-FeatureName $sName
            $suiteScreensDir = Join-Path $screensDir $sName
            $suiteScreensPath = if (Test-Path $suiteScreensDir) { $suiteScreensDir } else { 'N/A' }
            if (Test-Path $suiteScreensDir) {
              $suiteIndexPath = Join-Path $suiteScreensDir 'index.html'
              $pngFiles = Get-ChildItem -Path $suiteScreensDir -Filter *.png -File -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending
              $indexRows = ''
              foreach ($img in $pngFiles) {
                $imgHref = 'file:///' + ($img.FullName -replace '\\', '/')
                $indexRows += '<tr><td style="padding:8px 10px;border:1px solid #ddd;">' + $img.Name + '</td><td style="padding:8px 10px;border:1px solid #ddd;"><a href="' + $imgHref + '">Open</a></td></tr>'
              }
              if ([string]::IsNullOrWhiteSpace($indexRows)) {
                $indexRows = '<tr><td colspan="2" style="padding:8px 10px;border:1px solid #ddd;">No screenshots found.</td></tr>'
              }
              $reportIndexPath = Join-Path $reportDir 'index.html'
              $reportHref = if (Test-Path $reportIndexPath) { 'file:///' + ($reportIndexPath -replace '\\', '/') } else { '' }
              $backLinkHtml = if ([string]::IsNullOrWhiteSpace($reportHref)) { '' } else { '<div style="margin-bottom:12px;"><a href="' + $reportHref + '" style="text-decoration:none;color:#0d3d6b;font-size:13px;">&larr; Back to report</a></div>' }
              $indexHtml = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>' + $sName + ' Screenshots</title></head><body style="font-family:Arial,Helvetica,sans-serif;padding:16px;">' + $backLinkHtml + '<h2 style="margin-top:0;">' + $sName + ' - Screenshots</h2><table style="border-collapse:collapse;width:100%;max-width:900px;"><tr><th style="text-align:left;padding:8px 10px;border:1px solid #ddd;background:#f2f5f8;">File</th><th style="text-align:left;padding:8px 10px;border:1px solid #ddd;background:#f2f5f8;">View</th></tr>' + $indexRows + '</table></body></html>'
              Set-Content -Path $suiteIndexPath -Value $indexHtml -Encoding UTF8

              $suiteScreensHref = 'file:///' + ($suiteIndexPath -replace '\\', '/')
              $folderLink = '<a href="' + $suiteScreensHref + '" title="' + $suiteScreensPath + '" style="text-decoration:none;font-size:16px;">📁</a>'
            } else {
              $folderLink = 'N/A'
            }
            foreach ($spec in $suite.specs) {
              foreach ($t in $spec.tests) {
                $tDur = if ($t.results -and $t.results.Count -gt 0) { [math]::Round($t.results[-1].duration / 1000, 1) } else { '-' }
                $retry = if ($t.results -and $t.results.Count -gt 1) { ' <em style="color:#666;font-size:11px;">(retried)</em>' } else { '' }
                $rowFeatureName = $featureName
                if ($sName -eq 'own-fund-transfer') {
                  $titleText = ($spec.title + ' ' + $t.title).ToLower()
                  if ($titleText -match 'local\s*to\s*local') {
                    $rowFeatureName = 'Own Fund Transfer (Local to Local)'
                  } elseif ($titleText -match 'eur\s*to\s*usd') {
                    $rowFeatureName = 'Own Fund Transfer (EUR to USD)'
                  }
                }
                if ($t.status -eq 'expected')   { $rBg = '#f0faf0'; $badge = 'PASS'; $bClr = '#1b5e20' }
                elseif ($t.status -eq 'unexpected') { $rBg = '#fff0f0'; $badge = 'FAIL'; $bClr = '#b71c1c' }
                elseif ($t.status -eq 'skipped') { $rBg = '#fffde7'; $badge = 'SKIP'; $bClr = '#e65100' }
                else { $rBg = '#f5f5f5'; $badge = $t.status.ToUpper(); $bClr = '#555' }
                $out += '<tr style="background:' + $rBg + ';">'
                $out += '<td style="padding:7px 10px;border:1px solid #e0e0e0;">' + $rowFeatureName + '</td>'
                $out += '<td style="padding:7px 10px;border:1px solid #e0e0e0;">' + $sName + '</td>'
                $out += '<td style="padding:7px 10px;border:1px solid #e0e0e0;text-align:center;">' + $folderLink + '</td>'
                $out += '<td style="padding:7px 10px;border:1px solid #e0e0e0;text-align:center;"><span style="background:' + $bClr + ';color:#fff;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:bold;">' + $badge + '</span></td>'
                $out += '<td style="padding:7px 10px;border:1px solid #e0e0e0;text-align:right;font-family:monospace;">' + $tDur + 's</td>'
                $out += '</tr>'
              }
            }
            foreach ($sub in $suite.suites) { $out += Get-TestRows $sub $sName }
            return $out
          }
          if (Test-Path $resultsJson) {
            $jData   = Get-Content $resultsJson -Raw | ConvertFrom-Json
            $passed  = [int]$jData.stats.expected
            $failed  = [int]$jData.stats.unexpected
            $skipped = [int]$jData.stats.skipped
            $total   = $passed + $failed + $skipped
            $durSec  = [math]::Round($jData.stats.duration / 1000, 1)
            foreach ($suite in $jData.suites) {
              $sName = ($suite.title -replace '\.spec\.js$','') -replace '^.*[/\\]',''
              $rows += Get-TestRows $suite $sName
            }
          }
          $pRate = if ($total -gt 0) { [math]::Round(($passed  / $total) * 100, 0) } else { 0 }
          $fRate = if ($total -gt 0) { [math]::Round(($failed  / $total) * 100, 0) } else { 0 }
          $sRate = if ($total -gt 0) { [math]::Round(($skipped / $total) * 100, 0) } else { 0 }
          $screensLink = if (Test-Path $screensDir) { $screensDir } else { 'N/A' }
          $logoSrc = 'https://1000logos.net/wp-content/uploads/2022/09/Absa-logo.png'
          $logoPathCandidates = @(
            (Join-Path (Get-Location) 'playwright-demo/assets/absa-logo.png'),
            (Join-Path (Get-Location) 'assets/absa-logo.png')
          )
          $logoPath = $logoPathCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($logoPath) {
            $logoBytes = [System.IO.File]::ReadAllBytes($logoPath)
            $logoB64 = [System.Convert]::ToBase64String($logoBytes)
            $logoSrc = 'data:image/png;base64,' + $logoB64
          }
          $b  = '<!DOCTYPE html><html><head><meta charset="UTF-8"><style>'
          $b += 'body{margin:0;padding:20px;background:#eef2f7;font-family:Arial,Helvetica,sans-serif;color:#222;}'
          $b += '.card{max-width:840px;margin:0 auto;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 3px 14px rgba(0,0,0,.15);}'
          $b += '.hdr{padding:22px 32px;color:#000;background:#fff;border:2px solid #333;border-radius:6px;}'
            $b += '.brand-row{display:flex;align-items:center;gap:12px;margin-bottom:8px;}'
            $b += '.logo-img{height:40px;width:auto;display:block;border-radius:4px;}'
            $b += '.hdr h1{margin:0 0 8px;font-size:18px;letter-spacing:.3px;font-weight:bold;}'
            $b += '.hdr p{margin:0;font-size:13px;color:#555;}'
            $b += '.hdr-divider{height:1px;background:#d9dee5;margin:10px 0 0;}'
          $b += '.body{padding:22px 32px;}'
          $b += '.meta{width:100%;border-collapse:collapse;margin-bottom:18px;font-size:13px;}'
          $b += '.meta td{padding:8px 12px;border:1px solid #e8e8e8;}'
          $b += '.meta td:first-child{background:#f5f7fa;font-weight:bold;color:#444;width:175px;}'
          $b += '.kpi-row{display:flex;gap:12px;margin:16px 0;}'
          $b += '.kpi{flex:1;padding:14px 10px;border-radius:6px;text-align:center;}'
          $b += '.kpi-num{font-size:32px;font-weight:bold;line-height:1;}'
          $b += '.kpi-lbl{font-size:11px;font-weight:bold;letter-spacing:.5px;margin-top:5px;opacity:.75;}'
          $b += '.bar-wrap{margin:4px 0 20px;}'
          $b += '.bar-labels{display:flex;justify-content:space-between;font-size:11px;color:#666;margin-bottom:4px;}'
          $b += '.bar{height:14px;border-radius:7px;overflow:hidden;display:flex;background:#e0e0e0;}'
          $b += '.bp{background:#2e7d32;}'
          $b += '.bf{background:#c62828;}'
          $b += '.bs{background:#f9a825;}'
          $b += '.section-title{font-size:14px;font-weight:bold;color:#0d3d6b;margin:0 0 8px;padding-bottom:6px;border-bottom:2px solid #0d3d6b;}'
          $b += '.tbl{width:100%;border-collapse:collapse;font-size:12.5px;}'
          $b += '.tbl th{background:#0d3d6b;color:#fff;padding:9px 10px;text-align:left;font-size:12px;font-weight:bold;}'
          $b += '.note{margin-top:16px;padding:12px 16px;background:#e8f4fd;border-left:4px solid #0d3d6b;border-radius:0 4px 4px 0;font-size:12px;color:#333;}'
          $b += '.ftr{background:#f5f7fa;padding:13px 32px;font-size:11px;color:#999;border-top:1px solid #e8e8e8;text-align:center;}'
          $b += '</style></head><body>'
          $b += '<div class="card">'
          $b += '<div class="hdr">'
          $b += '<div class="brand-row"><img class="logo-img" src="' + $logoSrc + '" alt="ABSA Logo" /><h1>Automated Regression Test Report</h1></div>'
          $b += '<p>Banking Platform (AIB-SC-UAT) &nbsp;|&nbsp; Environment: UAT &nbsp;|&nbsp; Automation: Playwright + GitHub Actions</p>'
          $b += '<div class="hdr-divider"></div>'
          $b += '</div>'
          $b += '<div class="body">'
          $b += '<table class="meta">'
          $b += '<tr><td>Repository</td><td>AB021S5/test</td></tr>'
          $b += '<tr><td>Branch</td><td>main</td></tr>'
          $b += '<tr><td>Execution Date</td><td>' + $dateStr + ' UTC</td></tr>'
          $b += '<tr><td>Total Duration</td><td>' + $durSec + ' s</td></tr>'
          $b += '<tr><td>Screenshots Folder</td><td style="font-family:monospace;font-size:12px;">' + $screensLink + '</td></tr>'
          $b += '</table>'
          $b += '<div class="kpi-row">'
          $b += '<div class="kpi" style="background:#e8f5e9;color:#1b5e20;"><div class="kpi-num">' + $passed + '</div><div class="kpi-lbl">PASSED (' + $pRate + '%)</div></div>'
          $b += '<div class="kpi" style="background:#ffebee;color:#b71c1c;"><div class="kpi-num">' + $failed + '</div><div class="kpi-lbl">FAILED (' + $fRate + '%)</div></div>'
          $b += '<div class="kpi" style="background:#fff8e1;color:#e65100;"><div class="kpi-num">' + $skipped + '</div><div class="kpi-lbl">SKIPPED (' + $sRate + '%)</div></div>'
          $b += '<div class="kpi" style="background:#e3f2fd;color:#0d3d6b;"><div class="kpi-num">' + $total + '</div><div class="kpi-lbl">TOTAL CASES</div></div>'
          $b += '</div>'
          $b += '<div class="bar-wrap">'
          $b += '<div class="bar-labels"><span style="color:#2e7d32;">&#9646; Pass ' + $pRate + '%</span><span style="color:#c62828;">&#9646; Fail ' + $fRate + '%</span><span style="color:#f9a825;">&#9646; Skip ' + $sRate + '%</span></div>'
          $b += '<div class="bar"><div class="bp" style="width:' + $pRate + '%;"></div><div class="bf" style="width:' + $fRate + '%;"></div><div class="bs" style="width:' + $sRate + '%;"></div></div>'
          $b += '</div>'
          if ($rows -ne '') {
            $b += '<p class="section-title">Test Case Execution Breakdown</p>'
            $b += '<table class="tbl"><tr><th>Test Case</th><th>Test Suite</th><th style="text-align:center;width:90px;">Screenshots</th><th style="text-align:center;width:80px;">Status</th><th style="text-align:right;width:80px;">Duration</th></tr>'
            $b += $rows
            $b += '</table>'
          }
          if ($hasReport) {
            $b += '<div class="note"><strong>HTML Report Attached:</strong> Full Playwright report is attached as a ZIP file. Extract it and open <code>index.html</code> to view detailed results, screenshots (embedded per test step), traces, and error logs.</div>'
          } else {
            $b += '<div class="note" style="border-left-color:#b71c1c;background:#fff0f0;">No HTML report was generated — tests may not have started. Check the runner status and GitHub Actions logs.</div>'
          }
          $b += '</div>'
          $b += '<div class="ftr">This is an automated QA notification | AI Banking Platform Test Automation Suite | GitHub Actions Self-Hosted Runner | Do not reply to this email.</div>'
          $b += '</div></body></html>'
          $subj = 'Auto Genrated mail | Playwright Automation Report | AIB-SC-UAT | ' + $dateStr + ' UTC'
          $toRecipients = 'lokesh.jain@absa.africa'
          $ccRecipients = 'lokesh.jain@absa.africa'
          $emailSent = $false

          Write-Host "Email diagnostics -> User: $env:USERNAME | Session: $env:SESSIONNAME | Host: $env:COMPUTERNAME"
          if (-not [string]::IsNullOrWhiteSpace($env:SMTP_HOST) -and -not [string]::IsNullOrWhiteSpace($env:SMTP_USER) -and -not [string]::IsNullOrWhiteSpace($env:SMTP_PASS)) {
            try {
              $smtpPort = if ([string]::IsNullOrWhiteSpace($env:SMTP_PORT)) { 587 } else { [int]$env:SMTP_PORT }
              $smtpEnableSsl = if ([string]::IsNullOrWhiteSpace($env:SMTP_ENABLE_SSL)) { $true } else { [bool]::Parse($env:SMTP_ENABLE_SSL) }

              $smtpClient = New-Object System.Net.Mail.SmtpClient($env:SMTP_HOST, $smtpPort)
              $smtpClient.EnableSsl = $smtpEnableSsl
              $smtpClient.Credentials = New-Object System.Net.NetworkCredential($env:SMTP_USER, $env:SMTP_PASS)

              $msg = New-Object System.Net.Mail.MailMessage
              $msg.From = $env:SMTP_USER
              foreach ($addr in ($toRecipients -split ';')) { if (-not [string]::IsNullOrWhiteSpace($addr)) { $msg.To.Add($addr.Trim()) } }
              foreach ($addr in ($ccRecipients -split ';')) { if (-not [string]::IsNullOrWhiteSpace($addr)) { $msg.CC.Add($addr.Trim()) } }
              $msg.Subject = $subj
              $msg.Body = $b
              $msg.IsBodyHtml = $true
              if ($hasReport) { $msg.Attachments.Add($zipPath) | Out-Null }

              $smtpClient.Send($msg)
              $emailSent = $true
              Write-Host "Email sent via SMTP fallback: $subj"
            } catch {
              Write-Host 'Warning: SMTP email send failed.'
              Write-Host $_.Exception.Message
              Write-Host $_.Exception.ToString()
            }
          }

          if (-not $emailSent) {
            try {
              $outlook = New-Object -ComObject Outlook.Application
              $mail    = $outlook.CreateItem(0)
              $senderSmtp = 'lokesh.jain@absa.africa'
              $sendAccount = $null
              foreach ($acc in $outlook.Session.Accounts) {
                if ($acc.SmtpAddress -and $acc.SmtpAddress.ToLower() -eq $senderSmtp) {
                  $sendAccount = $acc
                  break
                }
              }
              if ($sendAccount -ne $null) {
                $mail.SendUsingAccount = $sendAccount
                Write-Host "Using Outlook account: $($sendAccount.SmtpAddress)"
              } else {
                Write-Host "Warning: Outlook account $senderSmtp not found in current VDI profile; using default account."
              }
              $mail.To = $toRecipients
              $mail.CC = $ccRecipients
              $mail.Subject = $subj
              $mail.HTMLBody = $b
              if ($hasReport) { $mail.Attachments.Add($zipPath) | Out-Null }
              $mail.Send()
              $emailSent = $true
              Write-Host "Email sent via Outlook: $subj"
            } catch {
              Write-Host 'Warning: Could not send email via Outlook.'
              Write-Host $_.Exception.Message
              Write-Host $_.Exception.ToString()
            }
          }

          if (-not $emailSent) {
            Write-Host 'Warning: No email was sent. Configure SMTP_* secrets for fallback or run runner in an interactive Outlook session.'
          }

      - name: Fail job if tests failed
        if: steps.run_tests.outcome == 'failure'
        shell: powershell
        run: |
          Write-Host "One or more tests failed. Marking workflow run as failed."
          exit 1