name: Scheduled Playwright Run

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: scheduled-playwright-oft
  cancel-in-progress: true

on:
  schedule:
    # Runs daily at 12:45 PM IST (7:15 AM UTC).
    - cron: '15 7 * * *'
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: self-hosted
    timeout-minutes: 45

    defaults:
      run:
        working-directory: playwright-demo

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      CI: 'true'
      PW_TRACE_MODE: 'off'
      PW_SCREENSHOT_KEEP_RUNS: '1'
      PW_HTML_REPORT: '1'
      BASE_URL: ${{ secrets.BASE_URL }}
      LOGIN_USERNAME: ${{ secrets.LOGIN_USERNAME }}
      LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
      LOGIN_OTP: ${{ secrets.LOGIN_OTP }}
      HEADLESS: 'true'
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      SMTP_ENABLE_SSL: ${{ secrets.SMTP_ENABLE_SSL }}
      OFT_LOCAL_FROM_ACCOUNT_TYPE: ${{ secrets.OFT_LOCAL_FROM_ACCOUNT_TYPE }}
      OFT_LOCAL_TO_ACCOUNT_TYPE: ${{ secrets.OFT_LOCAL_TO_ACCOUNT_TYPE }}
      OFT_LOCAL_AMOUNT: ${{ secrets.OFT_LOCAL_AMOUNT }}
      OFT_LOCAL_DESCRIPTION: ${{ secrets.OFT_LOCAL_DESCRIPTION }}
      OFT_EUR_FROM_ACCOUNT_TYPE: ${{ secrets.OFT_EUR_FROM_ACCOUNT_TYPE }}
      OFT_EUR_TO_ACCOUNT_TYPE: ${{ secrets.OFT_EUR_TO_ACCOUNT_TYPE }}
      OFT_EUR_AMOUNT: ${{ secrets.OFT_EUR_AMOUNT }}
      OFT_EUR_DESCRIPTION: ${{ secrets.OFT_EUR_DESCRIPTION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: powershell
        run: |
          $required = @(
            'BASE_URL','LOGIN_USERNAME','LOGIN_PASSWORD','LOGIN_OTP',
            'OFT_LOCAL_FROM_ACCOUNT_TYPE','OFT_LOCAL_TO_ACCOUNT_TYPE',
            'OFT_LOCAL_AMOUNT','OFT_LOCAL_DESCRIPTION',
            'OFT_EUR_FROM_ACCOUNT_TYPE','OFT_EUR_TO_ACCOUNT_TYPE',
            'OFT_EUR_AMOUNT','OFT_EUR_DESCRIPTION'
          )
          $missing = @()
          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace((Get-Item -Path "Env:$name" -ErrorAction SilentlyContinue).Value)) {
              $missing += $name
            }
          }
          if ($missing.Count -gt 0) {
            $missing | ForEach-Object { Write-Host "Missing secret: $_" }
            throw 'Required secrets are missing.'
          }
          Write-Host 'All required secrets are present.'

      - name: Check app is reachable
        shell: powershell
        run: |
          $url = $env:BASE_URL
          Write-Host "Checking connectivity to: $url"
          try {
            $response = Invoke-WebRequest -Uri $url -TimeoutSec 15 -UseBasicParsing -ErrorAction Stop
            Write-Host "App is reachable. Status: $($response.StatusCode)"
          } catch {
            Write-Host "ERROR: Cannot reach $url"
            Write-Host 'Make sure this runner has network access to the internal app URL.'
            throw 'App URL is not reachable from this runner. Aborting tests.'
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install

      - name: Pre-run maintenance cleanup
        run: npm run maintenance:pre-run

      - name: Run all test suites
        id: run_tests
        continue-on-error: true
        run: npx playwright test --workers=1 --retries=1

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-demo/playwright-report
            playwright-demo/test-results
          if-no-files-found: ignore

      - name: Prepare screenshots for GitHub Pages
        if: always()
        shell: powershell
        run: |
          $pagesDir = Join-Path $env:RUNNER_TEMP 'gh-pages'
          if (Test-Path $pagesDir) {
            Remove-Item -Path $pagesDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $pagesDir -Force | Out-Null
          $screensDir = 'screenshots'
          if (Test-Path $screensDir) {
            $destScreens = Join-Path $pagesDir 'screenshots'
            New-Item -ItemType Directory -Path $destScreens -Force | Out-Null
            Get-ChildItem -Path $screensDir -Recurse | ForEach-Object {
              if ($_.PSIsContainer) {
                $relative = $_.FullName.Substring((Resolve-Path $screensDir).Path.Length).TrimStart('\\')
                if ($relative) {
                  New-Item -ItemType Directory -Path (Join-Path $destScreens $relative) -Force | Out-Null
                }
              } else {
                $relative = $_.FullName.Substring((Resolve-Path $screensDir).Path.Length).TrimStart('\\')
                $targetFile = Join-Path $destScreens $relative
                $targetDir = Split-Path -Parent $targetFile
                if (-not (Test-Path $targetDir)) {
                  New-Item -ItemType Directory -Path $targetDir -Force | Out-Null
                }
                try {
                  [System.IO.File]::Copy($_.FullName, $targetFile, $true)
                } catch {
                  Write-Host "Warning: Could not copy $($_.FullName): $_"
                }
              }
            }

            Get-ChildItem -Path $destScreens -Directory -ErrorAction SilentlyContinue | ForEach-Object {
              $suiteDir = $_
              $rows = @()
              Get-ChildItem -Path $suiteDir.FullName -Filter *.png -File -ErrorAction SilentlyContinue | Sort-Object Name | ForEach-Object {
                $rows += '<tr><td style="padding:8px 10px;border:1px solid #ddd;">' + $_.Name + '</td><td style="padding:8px 10px;border:1px solid #ddd;"><a href="./' + $_.Name + '">Open</a></td><td style="padding:8px 10px;border:1px solid #ddd;"><a href="./' + $_.Name + '"><img src="./' + $_.Name + '" alt="' + $_.Name + '" style="max-width:240px;max-height:130px;border:1px solid #d9dee5;" /></a></td></tr>'
              }
              if ($rows.Count -eq 0) {
                $rows = @('<tr><td colspan="3" style="padding:8px 10px;border:1px solid #ddd;">No screenshots found.</td></tr>')
              }
              $suiteIndexHtml = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>' + $suiteDir.Name + ' Screenshots</title></head><body style="font-family:Arial,Helvetica,sans-serif;padding:16px;"><div style="margin-bottom:12px;"><a href="../index.html" style="text-decoration:none;color:#0d3d6b;font-size:13px;">&larr; Back to screenshots</a></div><h2 style="margin-top:0;">' + $suiteDir.Name + ' - Screenshots</h2><table style="border-collapse:collapse;width:100%;max-width:980px;"><tr><th style="text-align:left;padding:8px 10px;border:1px solid #ddd;background:#f2f5f8;">File</th><th style="text-align:left;padding:8px 10px;border:1px solid #ddd;background:#f2f5f8;">View</th><th style="text-align:left;padding:8px 10px;border:1px solid #ddd;background:#f2f5f8;">Preview</th></tr>' + ($rows -join '') + '</table></body></html>'
              Set-Content -Path (Join-Path $suiteDir.FullName 'index.html') -Value $suiteIndexHtml -Encoding UTF8
            }

            $screensIndexPath = Join-Path $destScreens 'index.html'
            if (-not (Test-Path $screensIndexPath)) {
              $suiteRows = @()
              Get-ChildItem -Path $destScreens -Directory -ErrorAction SilentlyContinue | ForEach-Object {
                $suiteRows += '<tr><td style="padding:8px 10px;border:1px solid #ddd;">' + $_.Name + '</td><td style="padding:8px 10px;border:1px solid #ddd;"><a href="./' + $_.Name + '/">Open</a></td></tr>'
              }
              if ($suiteRows.Count -eq 0) {
                $suiteRows = @('<tr><td colspan="2" style="padding:8px 10px;border:1px solid #ddd;">No screenshots found for this run.</td></tr>')
              }
              $screensIndexHtml = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Playwright Screenshots</title></head><body style="font-family:Arial,Helvetica,sans-serif;padding:16px;"><div style="margin-bottom:12px;"><a href="../index.html" style="text-decoration:none;color:#0d3d6b;font-size:13px;">&larr; Back</a></div><h2 style="margin-top:0;">Playwright Screenshot Suites</h2><table style="border-collapse:collapse;width:100%;max-width:820px;"><tr><th style="text-align:left;padding:8px 10px;border:1px solid #ddd;background:#f2f5f8;">Suite</th><th style="text-align:left;padding:8px 10px;border:1px solid #ddd;background:#f2f5f8;">Open</th></tr>' + ($suiteRows -join '') + '</table></body></html>'
              Set-Content -Path $screensIndexPath -Value $screensIndexHtml -Encoding UTF8
            }
          }
          $rootIndex = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Playwright Screenshots</title></head><body style="font-family:Arial,Helvetica,sans-serif;padding:24px;"><h2>Playwright Test Screenshots</h2><p><a href="screenshots/">Browse screenshots</a></p></body></html>'
          Set-Content -Path (Join-Path $pagesDir 'index.html') -Value $rootIndex -Encoding UTF8
          Write-Host "Pages artifact prepared at: $pagesDir"

      - name: Ensure Git Bash is available
        if: always()
        shell: powershell
        run: |
          $bashDirs = @(
            'C:\Users\AB021S5\AppData\Local\Programs\Git\bin',
            'C:\Users\AB021S5\AppData\Local\Programs\Git\usr\bin',
            'C:\Program Files\Git\bin',
            'C:\Program Files\Git\usr\bin'
          )
          foreach ($dir in $bashDirs) {
            if (Test-Path (Join-Path $dir 'bash.exe')) {
              $dir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            }
          }

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/gh-pages

      - name: Deploy to GitHub Pages
        id: deploy_pages
        if: always()
        uses: actions/deploy-pages@v4

      - name: Send test report email
        if: always()
        shell: powershell
        working-directory: ${{ github.workspace }}
        run: |
          & "$env:GITHUB_WORKSPACE\playwright-demo\scripts\send-email-report.ps1" `
            -WorkspaceRoot $env:GITHUB_WORKSPACE `
            -PublicScreensBaseUrl 'https://AB021S5.github.io/test/screenshots'

      - name: Fail job if tests failed
        if: steps.run_tests.outcome == 'failure'
        shell: powershell
        run: |
          Write-Host "One or more tests failed. Marking workflow run as failed."
          exit 1
