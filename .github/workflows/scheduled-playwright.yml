name: Scheduled Playwright Run

permissions:
  contents: read

concurrency:
  group: scheduled-playwright-oft
  cancel-in-progress: false

on:
  schedule:
     # Runs daily at 9:30 PM IST (16:00 UTC). Test run at 16:37 UTC.
     - cron: '37 16 * * *'
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: self-hosted
    timeout-minutes: 45

    defaults:
      run:
        working-directory: playwright-demo

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      BASE_URL: ${{ secrets.BASE_URL }}
      LOGIN_USERNAME: ${{ secrets.LOGIN_USERNAME }}
      LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
      LOGIN_OTP: ${{ secrets.LOGIN_OTP }}
      HEADLESS: 'true'
      OFT_LOCAL_FROM_ACCOUNT_TYPE: ${{ secrets.OFT_LOCAL_FROM_ACCOUNT_TYPE }}
      OFT_LOCAL_TO_ACCOUNT_TYPE: ${{ secrets.OFT_LOCAL_TO_ACCOUNT_TYPE }}
      OFT_LOCAL_AMOUNT: ${{ secrets.OFT_LOCAL_AMOUNT }}
      OFT_LOCAL_DESCRIPTION: ${{ secrets.OFT_LOCAL_DESCRIPTION }}
      OFT_EUR_FROM_ACCOUNT_TYPE: ${{ secrets.OFT_EUR_FROM_ACCOUNT_TYPE }}
      OFT_EUR_TO_ACCOUNT_TYPE: ${{ secrets.OFT_EUR_TO_ACCOUNT_TYPE }}
      OFT_EUR_AMOUNT: ${{ secrets.OFT_EUR_AMOUNT }}
      OFT_EUR_DESCRIPTION: ${{ secrets.OFT_EUR_DESCRIPTION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: powershell
        run: |
          $required = @(
            'BASE_URL','LOGIN_USERNAME','LOGIN_PASSWORD','LOGIN_OTP',
            'OFT_LOCAL_FROM_ACCOUNT_TYPE','OFT_LOCAL_TO_ACCOUNT_TYPE',
            'OFT_LOCAL_AMOUNT','OFT_LOCAL_DESCRIPTION',
            'OFT_EUR_FROM_ACCOUNT_TYPE','OFT_EUR_TO_ACCOUNT_TYPE',
            'OFT_EUR_AMOUNT','OFT_EUR_DESCRIPTION'
          )
          $missing = @()
          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace((Get-Item -Path "Env:$name" -ErrorAction SilentlyContinue).Value)) {
              $missing += $name
            }
          }
          if ($missing.Count -gt 0) {
            $missing | ForEach-Object { Write-Host "Missing secret: $_" }
            throw 'Required secrets are missing.'
          }
          Write-Host "All required secrets are present."

      - name: Check app is reachable
        shell: powershell
        run: |
          $url = $env:BASE_URL
          Write-Host "Checking connectivity to: $url"
          try {
            $response = Invoke-WebRequest -Uri $url -TimeoutSec 15 -UseBasicParsing -ErrorAction Stop
            Write-Host "App is reachable. Status: $($response.StatusCode)"
          } catch {
            Write-Host "ERROR: Cannot reach $url"
            Write-Host "Make sure this runner has network access to the internal app URL."
            throw 'App URL is not reachable from this runner. Aborting tests.'
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install

      - name: Run full regression suite
        id: run_tests
        continue-on-error: true
        run: npx playwright test --reporter=html,line --retries=1

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-demo/playwright-report
            playwright-demo/test-results
          if-no-files-found: ignore

      - name: Send test report email
        if: always()
        shell: powershell
        working-directory: ${{ github.workspace }}
        run: |
          $outcome = '${{ steps.run_tests.outcome }}'
          $status  = if ($outcome -eq 'success') { 'PASSED' } else { 'FAILED' }
          $color   = if ($status -eq 'PASSED') { '#2e7d32' } else { '#c62828' }
          $date    = Get-Date -Format 'dd MMM yyyy HH:mm'
          $reportDir  = Join-Path $env:GITHUB_WORKSPACE 'playwright-demo\playwright-report'
          $screensDir = Join-Path $env:GITHUB_WORKSPACE 'playwright-demo\screenshots'
          $zipPath    = Join-Path $env:RUNNER_TEMP 'playwright-report.zip'
          $hasReport  = $false
          if (Test-Path $reportDir) {
            Compress-Archive -Path $reportDir -DestinationPath $zipPath -Force
            $hasReport = $true
          }
          $body  = '<html><body style="font-family:Arial,sans-serif;padding:20px;">'
          $body += '<h2 style="color:' + $color + '">Playwright Tests: ' + $status + '</h2>'
          $body += '<table style="border-collapse:collapse;margin-top:10px;">'
          $body += '<tr><td style="padding:6px 16px 6px 0;"><b>Repository</b></td><td>AB021S5/test</td></tr>'
          $body += '<tr><td style="padding:6px 16px 6px 0;"><b>Date / Time</b></td><td>' + $date + ' UTC</td></tr>'
          $body += '<tr><td style="padding:6px 16px 6px 0;"><b>Result</b></td><td style="color:' + $color + ';font-weight:bold;">' + $status + '</td></tr>'
          $body += '</table>'
          if ($hasReport) {
            $body += '<p>Full HTML report is attached as a ZIP. Extract and open index.html to view results.</p>'
          } else {
            $body += '<p>No report was generated (tests may not have started).</p>'
          }
          $body += '</body></html>'
          try {
            $outlook = New-Object -ComObject Outlook.Application
            $mail = $outlook.CreateItem(0)
            $mail.To = 'lokesh.jain@absa.africa'
            $mail.Subject = '[Playwright] Tests ' + $status + ' | ' + $date + ' UTC'
            $mail.HTMLBody = $body
            if ($hasReport) { $mail.Attachments.Add($zipPath) | Out-Null }
            if (Test-Path $screensDir) {
              Get-ChildItem -Path $screensDir -Filter '*.png' | ForEach-Object {
                $mail.Attachments.Add($_.FullName) | Out-Null
              }
            }
            $mail.Send()
            Write-Host 'Email sent to lokesh.jain@absa.africa'
          } catch {
            Write-Host 'Warning: Could not send email via Outlook.'
            Write-Host $_.Exception.Message
          }

      - name: Fail job if tests failed
        if: steps.run_tests.outcome == 'failure'
        shell: powershell
        run: |
          Write-Host "One or more tests failed. Marking workflow run as failed."
          exit 1